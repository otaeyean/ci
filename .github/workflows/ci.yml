name: Node.js CI/CD

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build

      # [수정] 실행에 필요한 파일들을 몽땅 묶어서 저장합니다.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            dist
            package.json
            package-lock.json

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      # [수정] 묶인 파일들을 서버의 ~/sample-server 폴더로 보냅니다.
      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: 'dist,package.json,package-lock.json'
          target: '~/sample-server'

      - name: Restart Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd ~/sample-server
            npm install --production # [cite: 298, 434]
            # PM2로 서버를 켭니다. 이미 켜져있으면 재시작합니다.
            pm2 delete sample-app || true
            pm2 start dist/main.js --name sample-app # [cite: 431, 437]
